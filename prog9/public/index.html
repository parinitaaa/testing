<!DOCTYPE html>
<html>
<body>

<h3>Register</h3>
<input id="ru"><input id="rp">
<button onclick="reg()">Reg</button>

<h3>Login</h3>
<input id="lu"><input id="lp">
<button onclick="log()">Login</button>

<div id="q" style="display:none">
<p>2+2?
<input type="radio" name="q1" value="4">4
<input type="radio" name="q1" value="3">3</p>

<p>Capital?
<input type="radio" name="q2" value="Delhi">Delhi
<input type="radio" name="q2" value="Mumbai">Mumbai</p>

<p>JS?
<input type="radio" name="q3" value="JavaScript">JS
<input type="radio" name="q3" value="Java">Java</p>

<button onclick="sub()">Submit</button>
</div>

<button onclick="view()">Results</button>
<ul id="list"></ul>

<script>
let u="";

const post=(url,data)=>
fetch(url,{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)});

function reg(){
post("/register",{username:ru.value,password:rp.value})
.then(r=>r.text()).then(alert);
}

function log(){
post("/login",{username:lu.value,password:lp.value})
.then(r=>r.text()).then(x=>{
if(x=="Success"){u=lu.value;q.style.display="block";}
else alert("Fail");
});
}

function sub(){
let s=0;
if(document.querySelector('[name=q1]:checked')?.value=="4")s++;
if(document.querySelector('[name=q2]:checked')?.value=="Delhi")s++;
if(document.querySelector('[name=q3]:checked')?.value=="JavaScript")s++;

post("/submit",{username:u,score:s})
.then(()=>alert("Score:"+s));
}

function view(){
fetch("/results").then(r=>r.json()).then(d=>{
list.innerHTML="";
d.forEach(x=>list.innerHTML+=`<li>${x.username}:${x.score}</li>`);
});
}
</script>

</body>
</html>
