<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Programming Language Voting</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.container{
background:#fff;
padding:25px;
border-radius:10px;
width:400px;
text-align:center;
box-shadow:0 0 10px #0003;
}
.language{
display:flex;
justify-content:space-between;
margin:10px 0;
padding:10px;
background:#eee;
border-radius:6px;
}
button{
border:none;
background:#007BFF;
color:#fff;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}
button:hover{background:#0056b3}
.result{font-weight:bold;margin:5px 0}
</style>

</head>

<body>

<div class="container">
<h1>Vote for Best Programming Language</h1>

<div id="languages"></div>

<h2>Results</h2>
<div id="results"></div>
</div>

<script>
const langs=[
["JavaScript",0],
["Python",0],
["Java",0],
["C++",0],
["Go",0]
];

const L=document.getElementById("languages");
const R=document.getElementById("results");

function render(){
L.innerHTML=langs.map((l,i)=>
`<div class="language">
<span>${l[0]}</span>
<button onclick="vote(${i})">Vote</button>
</div>`).join("");

R.innerHTML=langs.map(l=>
`<div class="result">${l[0]} : ${l[1]} votes</div>`
).join("");
}

function vote(i){
langs[i][1]++;
render();
}

render();
</script>

</body>
</html>
